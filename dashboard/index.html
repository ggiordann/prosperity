<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backtest</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Backtest</h1>
    </header>

    <section class="controls">
      <div class="field">
        <label for="dataDir">Data Dir</label>
        <input id="dataDir" value="imcdata">
      </div>
      <div class="field">
        <label for="outputDir">Output Dir</label>
        <input id="outputDir" value="outputs/imcdata">
      </div>
      <div class="field">
        <label for="runSelect">Run</label>
        <select id="runSelect"></select>
      </div>
      <div class="actions">
        <button id="runButton">Run</button>
        <button id="loadButton">Load</button>
      </div>
      <p id="status" class="status">Idle</p>
    </section>

    <section class="stats">
      <div class="stat"><span>PnL</span><strong id="totalPnl">-</strong></div>
      <div class="stat"><span>Realized</span><strong id="realizedPnl">-</strong></div>
      <div class="stat"><span>Unrealized</span><strong id="unrealizedPnl">-</strong></div>
      <div class="stat"><span>Sharpe</span><strong id="sharpeLike">-</strong></div>
      <div class="stat"><span>Max DD</span><strong id="maxDrawdown">-</strong></div>
      <div class="stat"><span>Fill Ratio</span><strong id="fillRatio">-</strong></div>
    </section>

    <section class="chart-panel">
      <div class="chart-head">
        <h2 id="chartTitle">Equity Curve</h2>
        <p id="chartMeta">Buy markers = B, Sell markers = S</p>
      </div>
      <canvas id="equityCanvas" width="1200" height="460"></canvas>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
